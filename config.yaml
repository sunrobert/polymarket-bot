strategy:
  # Bot 1 (default — buy heavy favorites in closing seconds, no external signal).
  price_band: [0.85, 0.99]
  time_window_s: [1, 20]
  trade_size_usdc: 1.00

bot2_filter:
  # Bot 2 filter: buy in-band side ONLY if BTC direction agrees with the favorite.
  price_band: [0.85, 0.95]
  time_window_s: [5, 20]
  trade_size_usdc: 1.00

bot2_signal:
  # Bot 2 signal: trade when our BTC-derived fair value disagrees with market ask
  # by at least min_edge. sigma_per_sec_bps ~ 1.5 corresponds to BTC daily vol ~4%.
  # price_band is intentionally wide because the alpha case is exactly when the
  # market underprices our believed side (e.g. ask at $0.15 while we think 0.80).
  time_window_s: [5, 20]
  trade_size_usdc: 1.00
  min_edge: 0.02
  sigma_per_sec_bps: 1.5
  price_band: [0.05, 0.99]

bot3_dipbuyer:
  # Bot 3 dip buyer: enter Up when ask <= entry_price, exit when implied Up bid
  # (1 - Down ask) >= exit_price. Bets on overreaction bounces. If exit never
  # triggers, position holds to resolution (full $1 or $0).
  entry_price: 0.35
  exit_price: 0.55
  trade_size_usdc: 5.00

bot4_rallyfader:
  # Bot 4 rally fader: pessimistic mirror of Bot 3. Enter Down when Down ask
  # <= entry_price (i.e., Up has rallied hard), exit when implied Down bid
  # (1 - Up ask) >= exit_price. Bets that overshoots on rallies give back.
  entry_price: 0.35
  exit_price: 0.55
  trade_size_usdc: 5.00

risk:
  max_daily_trades: 50
  max_daily_loss_usdc: 10.00

recorder:
  dir: recordings

feed:
  # Pattern used by LiveFeed.discover_active_market to find the current 5-min BTC market.
  # Likely to need real-world adjustment on first run.
  gamma_url: https://gamma-api.polymarket.com
  clob_ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  clob_rest_url: https://clob.polymarket.com
  # Polymarket series slug for the recurring 5-minute BTC up/down markets.
  # The bot fetches the next un-resolved event in this series.
  series_slug: btc-up-or-down-5m
  heartbeat_interval_s: 1.0
  resolution_poll_interval_s: 5.0
